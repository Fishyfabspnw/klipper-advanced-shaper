name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[test]'
      - run: python -m pytest
      - name: Lint public integration files
        run: >-
          python -m ruff check
          src/klipper_advanced_shaper/__init__.py
          src/klipper_advanced_shaper/klippy
          tests/integration
          tests/test_packaging_contract.py
          tests/test_public_tree.py
          scripts
      - run: python scripts/verify_public_tree.py
      - run: python -m build
      - name: Inspect distributions
        run: python -m zipfile --list dist/*.whl
