# Mainsail-friendly wrappers for Klipper Advanced Shaper.
# Only ADV_SHAPER_UI_CALIBRATE is visible; underscore-prefixed helpers are hidden.

[gcode_macro ADV_SHAPER_UI_CALIBRATE]
description: AXIS direction; PROFILE tradeoff; REPEATS confidence; VALIDATE comparison; ACCEL_PER_HZ intensity; HZ_PER_SEC speed; SCV corner speed; FAST_VALIDATION shorter protocol; PEAK_LOCK strongest mode
gcode:
  {% set axis = params.AXIS|default("ALL")|upper %}
  {% set profile = params.PROFILE|default("balanced")|lower %}
  {% set repeats = params.REPEATS|default(3) %}
  {% set validate = params.VALIDATE|default(1) %}
  {% set accel_per_hz = params.ACCEL_PER_HZ|default("CONFIG") %}
  {% set hz_per_sec = params.HZ_PER_SEC|default("CONFIG") %}
  {% set scv = params.SCV|default("CONFIG") %}
  {% set fast_validation = params.FAST_VALIDATION|default(0) %}
  {% set peak_lock = params.PEAK_LOCK|default(0) %}
  {action_respond_info("Advanced Shaper parameters: AXIS chooses X, Y, or ALL; PROFILE chooses the selection tradeoff; REPEATS controls statistical confidence; VALIDATE enables held-out comparison; ACCEL_PER_HZ sets excitation intensity (CONFIG or 20..350); HZ_PER_SEC sets sweep speed (CONFIG or 0.1..2); SCV sets temporary square-corner velocity (CONFIG or 0.1..50 mm/s) with exact rollback; FAST_VALIDATION=1 runs one training, two reference, and two candidate sweeps and requires REPEATS=2 VALIDATE=1 HZ_PER_SEC=2; PEAK_LOCK=1 fixes generalized MZV frequency to the strongest measured mode. PROFILE=adaptive_stock compares only shapers executable by stock Klipper. High ACCEL_PER_HZ values must pass the printer-specific motion-budget preflight. Supervise the test, keep clear, and use M112 for an emergency stop. Calibration will not apply, stage, or save a result automatically.")}
  ADV_SHAPER_CALIBRATE AXIS={axis} PROFILE={profile} REPEATS={repeats} VALIDATE={validate} ACCEL_PER_HZ={accel_per_hz} HZ_PER_SEC={hz_per_sec} SCV={scv} FAST_VALIDATION={fast_validation} PEAK_LOCK={peak_lock}

[gcode_macro _ADV_SHAPER_UI_STATUS]
description: Show Advanced Shaper state, attempt, result, and rollback errors
gcode:
  ADV_SHAPER_STATUS

[gcode_macro _ADV_SHAPER_UI_CANCEL]
description: Request cancellation; rollback still completes before calibration exits
gcode:
  ADV_SHAPER_CANCEL

[gcode_macro _ADV_SHAPER_UI_APPLY]
description: Apply an accepted result for this runtime only; does not stage or save
gcode:
  {% set current_result = printer.advanced_input_shaper.result_id %}
  {% set result = params.RESULT|default(current_result, true) %}
  {% if not result %}
    {action_raise_error("No accepted Advanced Shaper result is ready to apply")}
  {% endif %}
  ADV_SHAPER_APPLY RESULT={result}

[gcode_macro _ADV_SHAPER_UI_STAGE]
description: Stage an accepted result; SAVE_CONFIG remains a separate operator action
gcode:
  {% set current_result = printer.advanced_input_shaper.result_id %}
  {% set result = params.RESULT|default(current_result, true) %}
  {% if not result %}
    {action_raise_error("No accepted Advanced Shaper result is ready to stage")}
  {% endif %}
  ADV_SHAPER_STAGE RESULT={result}
